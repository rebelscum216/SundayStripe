services:
  - type: web
    name: sunday-stripe-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: NODE_ENV=development pnpm install --frozen-lockfile && pnpm --filter @sunday-stripe/db build && pnpm --filter @sunday-stripe/api build
    startCommand: pnpm --filter @sunday-stripe/db migrate && node apps/api/dist/main.js
    healthCheckPath: /api/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

      # ── Database (Neon) ──────────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false          # postgresql://user:pass@ep-xxx.neon.tech/neondb?sslmode=require

      # ── Redis (Upstash) ──────────────────────────────────────────────────────
      - key: REDIS_URL
        sync: false          # rediss://default:password@your-endpoint.upstash.io:6380

      # ── Web app (Vercel) ─────────────────────────────────────────────────────
      - key: WEB_APP_URL
        sync: false          # https://your-app.vercel.app

      # ── Token encryption ─────────────────────────────────────────────────────
      - key: TOKEN_ENCRYPTION_KEY
        sync: false

      # ── Shopify ──────────────────────────────────────────────────────────────
      - key: SHOPIFY_SHOP
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false
      - key: SHOPIFY_SCOPES
        value: read_products,write_products,read_inventory,write_inventory,read_orders,read_content,write_content
      - key: SHOPIFY_API_VERSION
        value: 2025-10
      - key: SHOPIFY_APP_URL
        sync: false          # https://sunday-stripe-api.onrender.com
      - key: SHOPIFY_WEBHOOK_CALLBACK_URL
        sync: false          # https://sunday-stripe-api.onrender.com/api/shopify/webhooks
      - key: BRAND_TERMS
        value: sunday stripe,sundaystripe,sunday-stripe

      # ── OpenAI ───────────────────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false

      # ── Google Search Console ────────────────────────────────────────────────
      - key: GSC_SITE
        sync: false
      - key: GSC_TOKEN_JSON
        sync: false

      # ── Google Merchant Center ───────────────────────────────────────────────
      - key: GOOGLE_MERCHANT_ID
        sync: false
      - key: GOOGLE_MERCHANT_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_MERCHANT_DEVELOPER_EMAIL
        sync: false

      # ── Amazon SP-API ─────────────────────────────────────────────────────────
      - key: AMAZON_SELLER_ID
        sync: false
      - key: AMAZON_CLIENT_ID
        sync: false
      - key: AMAZON_CLIENT_SECRET
        sync: false
      - key: AMAZON_REFRESH_TOKEN
        sync: false
      - key: AMAZON_MARKETPLACE_ID
        value: ATVPDKIKX0DER
      - key: AMAZON_REGION
        value: us-east-1
